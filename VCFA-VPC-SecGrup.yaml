formatVersion: 1
inputs: {}
resources:
  CCI_VPC_1:
    type: CCI.VPC
    properties:
      regionName: us-east-a
      generateName: default-us-east-b
      privateIPs:
        - 172.16.205.0/24
  Group_1:
    type: CCI.VPC.Configuration
    dependsOn:
      - Attachment1
    properties:
      vpc: ${resource.CCI_VPC_1.id}
      kind: VPCNetworkSecurityGroup
      configs:
        - generateName: test-sec-group-001
          spec:
            ipAddresses:
              - 100.64.32.123
      apiVersion: vpc.nsx.vmware.com/v1alpha1
      wait:
        conditions:
          - type: Realized
            status: 'True'
  Attachment1:
    type: CCI.VPC.Configuration
    properties:
      vpc: ${resource.CCI_VPC_1.id}
      kind: VPCAttachment
      configs:
        - generateName: default
          spec:
            vpcConnectivityProfileName: default--us-east-a
      apiVersion: vpc.nsx.vmware.com/v1alpha1
